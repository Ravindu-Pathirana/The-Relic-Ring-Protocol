<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D5EF9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-dasharray="10 5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite" />
  </circle>
  <path d="M40 50 L60 50 M50 40 L50 60" stroke="white" stroke-width="2" stroke-linecap="round" />
  <circle cx="50" cy="50" r="8" fill="white" filter="url(#glow)" />
</svg>
